<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personal Library</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { primary: '#3b82f6' } } }
    }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Skeleton Loading Animation */
    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }
    .skeleton {
      animation: shimmer 2s infinite linear;
      background: linear-gradient(to right, #e2e8f0 4%, #cbd5e1 25%, #e2e8f0 36%);
      background-size: 1000px 100%;
    }
    .dark .skeleton {
      background: linear-gradient(to right, #374151 4%, #4b5563 25%, #374151 36%);
      background-size: 1000px 100%;
    }
    
    /* Scrollbar cleanup */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // --- UTILS & ICONS ---
    const StarIcon = ({ filled }) => (
      <svg className={`w-4 h-4 ${filled ? 'text-yellow-400' : 'text-gray-300 dark:text-gray-600'}`} fill="currentColor" viewBox="0 0 20 20">
        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
      </svg>
    );

    const STATUS_COLORS = {
      unread: 'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300',
      reading: 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300',
      read: 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300'
    };

    // --- COMPONENTS ---

    // 1. Stats Panel
    const StatsPanel = ({ books }) => {
      const stats = useMemo(() => {
        const total = books.length;
        const statuses = { read: 0, reading: 0, unread: 0 };
        const categories = {};
        let totalRating = 0, ratedCount = 0;

        books.forEach(b => {
          statuses[b.status] = (statuses[b.status] || 0) + 1;
          b.categories?.forEach(c => categories[c] = (categories[c] || 0) + 1);
          if (b.rating > 0) { totalRating += b.rating; ratedCount++; }
        });

        return {
          total, statuses,
          avgRating: ratedCount ? (totalRating / ratedCount).toFixed(1) : 0,
          categories: Object.entries(categories).sort((a,b) => b[1] - a[1]).slice(0, 5) // Top 5
        };
      }, [books]);

      return (
        <div className="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
          <h3 className="font-semibold mb-4 text-lg">Library Stats</h3>
          <div className="grid grid-cols-2 gap-4 mb-6">
            <div className="p-3 bg-primary/10 rounded-lg">
              <div className="text-2xl font-bold text-primary">{stats.total}</div>
              <div className="text-xs text-gray-500 dark:text-gray-400">Total Books</div>
            </div>
            <div className="p-3 bg-yellow-500/10 rounded-lg">
              <div className="text-2xl font-bold text-yellow-600 dark:text-yellow-400">{stats.avgRating}</div>
              <div className="text-xs text-gray-500 dark:text-gray-400">Avg Rating</div>
            </div>
          </div>
          
          <div className="space-y-3 text-sm">
            <div>
              <div className="flex justify-between mb-1"><span className="text-gray-500">Read</span><span>{stats.statuses.read}</span></div>
              <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5"><div className="bg-green-500 h-1.5 rounded-full" style={{width: `${(stats.statuses.read/stats.total)*100}%`}}></div></div>
            </div>
            <div>
              <div className="flex justify-between mb-1"><span className="text-gray-500">Reading</span><span>{stats.statuses.reading}</span></div>
              <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5"><div className="bg-yellow-500 h-1.5 rounded-full" style={{width: `${(stats.statuses.reading/stats.total)*100}%`}}></div></div>
            </div>
            <div>
              <div className="flex justify-between mb-1"><span className="text-gray-500">Unread</span><span>{stats.statuses.unread}</span></div>
              <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5"><div className="bg-gray-400 h-1.5 rounded-full" style={{width: `${(stats.statuses.unread/stats.total)*100}%`}}></div></div>
            </div>
          </div>
        </div>
      );
    };

    // 2. Book Modal
    const BookModal = ({ book, onClose, onTagClick }) => {
      if (!book) return null;

      // Escape key to close
      useEffect(() => {
        const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', handleEsc);
        return () => window.removeEventListener('keydown', handleEsc);
      }, [onClose]);

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm" onClick={onClose}>
          <div 
            className="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto shadow-2xl relative animate-fade-in"
            onClick={e => e.stopPropagation()}
            role="dialog"
          >
            <button onClick={onClose} className="absolute top-4 right-4 p-2 bg-gray-100 dark:bg-gray-700 rounded-full hover:bg-gray-200 dark:hover:bg-gray-600 transition">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            
            <div className="flex flex-col md:flex-row p-6 md:p-8 gap-8">
              {/* Cover */}
              <div className="w-full md:w-1/3 flex-shrink-0">
                <div className="aspect-[2/3] rounded-lg overflow-hidden shadow-md bg-gray-100 dark:bg-gray-700">
                  {book.image_url ? (
                    <img src={book.image_url} alt={book.title} className="w-full h-full object-cover" onError={e => e.target.style.display = 'none'} />
                  ) : (
                    <div className="w-full h-full flex items-center justify-center text-gray-400">No Cover</div>
                  )}
                </div>
                {book.url && (
                  <a href={book.url} target="_blank" rel="noreferrer" className="mt-4 block w-full text-center py-2 bg-primary text-white rounded-lg hover:bg-blue-600 transition font-medium">
                    View External Link
                  </a>
                )}
              </div>

              {/* Details */}
              <div className="w-full md:w-2/3 space-y-6">
                <div>
                  <div className="flex items-center gap-3 mb-2">
                    <span className={`px-2.5 py-0.5 rounded-full text-xs font-medium uppercase tracking-wider ${STATUS_COLORS[book.status]}`}>{book.status}</span>
                    <div className="flex">{Array.from({ length: 5 }).map((_, i) => <StarIcon key={i} filled={i < book.rating} />)}</div>
                  </div>
                  <h2 className="text-3xl font-bold text-gray-900 dark:text-white leading-tight">{book.title}</h2>
                  <p className="text-lg text-gray-600 dark:text-gray-300 mt-2">by {book.authors?.join(', ')}</p>
                </div>

                <div className="grid grid-cols-2 sm:grid-cols-3 gap-y-4 gap-x-6 text-sm py-4 border-y border-gray-100 dark:border-gray-700">
                  <div><p className="text-gray-500 mb-1">Year</p><p className="font-medium">{book.year || 'Unknown'}</p></div>
                  <div><p className="text-gray-500 mb-1">Publisher</p><p className="font-medium">{book.publisher || 'Unknown'}</p></div>
                  <div><p className="text-gray-500 mb-1">Pages</p><p className="font-medium">{book.pages || '-'}</p></div>
                  <div><p className="text-gray-500 mb-1">Language</p><p className="font-medium capitalize">{book.language || '-'}</p></div>
                  <div><p className="text-gray-500 mb-1">ISBN</p><p className="font-medium">{book.isbn || '-'}</p></div>
                  <div><p className="text-gray-500 mb-1">Date Added</p><p className="font-medium">{book.date_added || '-'}</p></div>
                </div>

                {book.notes && (
                  <div>
                    <h3 className="font-semibold text-lg mb-2">Notes</h3>
                    <p className="text-gray-600 dark:text-gray-300 leading-relaxed p-4 bg-gray-50 dark:bg-gray-700/50 rounded-lg italic">"{book.notes}"</p>
                  </div>
                )}

                {(book.tags?.length > 0 || book.categories?.length > 0) && (
                  <div>
                    <h3 className="font-semibold mb-3">Tags & Categories</h3>
                    <div className="flex flex-wrap gap-2">
                      {book.categories?.map(c => (
                        <span key={`cat-${c}`} className="px-3 py-1 bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300 rounded-lg text-sm cursor-pointer hover:opacity-80" onClick={() => { onTagClick(c, 'category'); onClose(); }}>
                          {c}
                        </span>
                      ))}
                      {book.tags?.map(t => (
                        <span key={`tag-${t}`} className="px-3 py-1 bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-300 rounded-lg text-sm cursor-pointer hover:opacity-80" onClick={() => { onTagClick(t, 'tag'); onClose(); }}>
                          #{t}
                        </span>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // 3. Main App
    const App = () => {
      const [books, setBooks] = useState([]);
      const [loading, setLoading] = useState(true);
      
      // State setup with URL parameters handling
      const params = new URLSearchParams(window.location.search);
      const [searchQuery, setSearchQuery] = useState(params.get('q') || '');
      const [debouncedSearch, setDebouncedSearch] = useState(searchQuery);
      
      const [filters, setFilters] = useState({
        status: params.get('status') ? params.get('status').split(',') : [],
        category: params.get('category') ? params.get('category').split(',') : [],
        language: params.get('language') ? params.get('language').split(',') : []
      });
      
      const [sort, setSort] = useState({
        field: params.get('sort') || 'date_added',
        order: params.get('order') || 'desc'
      });
      
      const [view, setView] = useState(params.get('view') || 'grid');
      const [darkMode, setDarkMode] = useState(() => localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches));
      const [selectedBook, setSelectedBook] = useState(null);
      
      const searchInputRef = useRef(null);

      // Fetch Data
      useEffect(() => {
        fetch('books.json')
          .then(res => res.json())
          .then(data => {
            setBooks(data["books"]);
            setLoading(false);
          })
          .catch(err => {
            console.error("Failed to load books.json", err);
            setLoading(false);
          });
      }, []);

      // Debounce Search
      useEffect(() => {
        const timer = setTimeout(() => setDebouncedSearch(searchQuery), 300);
        return () => clearTimeout(timer);
      }, [searchQuery]);

      // URL Synchronization
      useEffect(() => {
        const newParams = new URLSearchParams();
        if (debouncedSearch) newParams.set('q', debouncedSearch);
        if (filters.status.length) newParams.set('status', filters.status.join(','));
        if (filters.category.length) newParams.set('category', filters.category.join(','));
        if (filters.language.length) newParams.set('language', filters.language.join(','));
        if (sort.field !== 'date_added') newParams.set('sort', sort.field);
        if (sort.order !== 'desc') newParams.set('order', sort.order);
        if (view !== 'grid') newParams.set('view', view);

        const newUrl = `${window.location.pathname}${newParams.toString() ? '?' + newParams.toString() : ''}`;
        window.history.replaceState({}, '', newUrl);
      }, [debouncedSearch, filters, sort, view]);

      // Keyboard Shortcut '/'
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === '/' && document.activeElement !== searchInputRef.current) {
            e.preventDefault();
            searchInputRef.current?.focus();
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, []);

      // Dark Mode toggle side-effect
      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      }, [darkMode]);

      // Filter & Sort Logic
      const processedBooks = useMemo(() => {
        let result = books;

        // 1. Search
        if (debouncedSearch) {
          const q = debouncedSearch.toLowerCase();
          result = result.filter(b => 
            b.title.toLowerCase().includes(q) ||
            b.authors?.some(a => a.toLowerCase().includes(q)) ||
            b.tags?.some(t => t.toLowerCase().includes(q)) ||
            b.publisher?.toLowerCase().includes(q)
          );
        }

        // 2. Filters
        if (filters.status.length) result = result.filter(b => filters.status.includes(b.status));
        if (filters.category.length) result = result.filter(b => b.categories?.some(c => filters.category.includes(c)));
        if (filters.language.length) result = result.filter(b => filters.language.includes(b.language));

        // 3. Sort
        result = [...result].sort((a, b) => {
          let valA = a[sort.field];
          let valB = b[sort.field];
          
          if (typeof valA === 'string') valA = valA.toLowerCase();
          if (typeof valB === 'string') valB = valB.toLowerCase();
          
          if (valA < valB) return sort.order === 'asc' ? -1 : 1;
          if (valA > valB) return sort.order === 'asc' ? 1 : -1;
          return 0;
        });

        return result;
      }, [books, debouncedSearch, filters, sort]);

      // Unique Lists for Filter Dropdowns
      const filterOptions = useMemo(() => {
        const categories = new Set(), languages = new Set();
        books.forEach(b => {
          b.categories?.forEach(c => categories.add(c));
          if(b.language) languages.add(b.language);
        });
        return { categories: [...categories].sort(), languages: [...languages].sort() };
      }, [books]);

      const toggleFilter = (type, value) => {
        setFilters(prev => {
          const current = prev[type];
          return { ...prev, [type]: current.includes(value) ? current.filter(v => v !== value) : [...current, value] };
        });
      };

      const handleTagClick = (val, type) => {
        if (type === 'category') toggleFilter('category', val);
        if (type === 'tag') setSearchQuery(val); // Simplest way to filter by tag globally
      };

      const clearFilters = () => {
        setFilters({ status: [], category: [], language: [] });
        setSearchQuery('');
      };

      return (
        <div className="min-h-screen flex flex-col">
          {/* Header */}
          <header className="sticky top-0 z-30 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
            <div className="container mx-auto px-4 h-16 flex items-center justify-between gap-4">
              <div className="flex items-center gap-2 font-bold text-xl tracking-tight">
                <span className="text-primary text-2xl">📚</span> Library
              </div>
              
              <div className="flex-1 max-w-xl relative hidden sm:block">
                <input 
                  ref={searchInputRef}
                  type="text" 
                  placeholder="Search title, author, tag... (Press '/')" 
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full bg-gray-100 dark:bg-gray-800 border-none rounded-lg pl-10 pr-4 py-2 focus:ring-2 focus:ring-primary dark:text-white placeholder-gray-500 transition-shadow"
                />
                <svg className="w-5 h-5 absolute left-3 top-2.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
              </div>

              <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition">
                {darkMode ? 
                  <svg className="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fillRule="evenodd" clipRule="evenodd"></path></svg>
                  : 
                  <svg className="w-5 h-5 text-gray-600" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                }
              </button>
            </div>
          </header>

          <main className="flex-1 container mx-auto px-4 py-8 flex flex-col md:flex-row gap-8">
            {/* Sidebar Controls */}
            <aside className="w-full md:w-64 flex-shrink-0 space-y-6">
              {/* Mobile Search */}
              <div className="sm:hidden relative">
                <input 
                  type="text" 
                  placeholder="Search library..." 
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full bg-gray-100 dark:bg-gray-800 border-none rounded-lg pl-10 pr-4 py-2 focus:ring-2 focus:ring-primary dark:text-white"
                />
              </div>

              <StatsPanel books={books} />

              <div className="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="font-semibold text-lg">Filters</h3>
                  {(filters.status.length > 0 || filters.category.length > 0 || filters.language.length > 0) && (
                    <button onClick={clearFilters} className="text-xs text-primary hover:underline">Clear All</button>
                  )}
                </div>

                {/* Status Filter */}
                <div className="mb-6">
                  <h4 className="text-sm text-gray-500 mb-2 font-medium uppercase tracking-wider">Status</h4>
                  <div className="space-y-2">
                    {['unread', 'reading', 'read'].map(st => (
                      <label key={st} className="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" checked={filters.status.includes(st)} onChange={() => toggleFilter('status', st)} className="rounded border-gray-300 text-primary focus:ring-primary bg-transparent" />
                        <span className="capitalize text-sm">{st}</span>
                      </label>
                    ))}
                  </div>
                </div>

                {/* Category Filter */}
                {filterOptions.categories.length > 0 && (
                  <div className="mb-6">
                    <h4 className="text-sm text-gray-500 mb-2 font-medium uppercase tracking-wider">Category</h4>
                    <div className="space-y-2 max-h-40 overflow-y-auto pr-2">
                      {filterOptions.categories.map(cat => (
                        <label key={cat} className="flex items-center gap-2 cursor-pointer">
                          <input type="checkbox" checked={filters.category.includes(cat)} onChange={() => toggleFilter('category', cat)} className="rounded border-gray-300 text-primary focus:ring-primary bg-transparent" />
                          <span className="capitalize text-sm">{cat}</span>
                        </label>
                      ))}
                    </div>
                  </div>
                )}
                
                {/* Language Filter */}
                {filterOptions.languages.length > 0 && (
                  <div>
                    <h4 className="text-sm text-gray-500 mb-2 font-medium uppercase tracking-wider">Language</h4>
                    <div className="space-y-2">
                      {filterOptions.languages.map(lang => (
                        <label key={lang} className="flex items-center gap-2 cursor-pointer">
                          <input type="checkbox" checked={filters.language.includes(lang)} onChange={() => toggleFilter('language', lang)} className="rounded border-gray-300 text-primary focus:ring-primary bg-transparent" />
                          <span className="capitalize text-sm">{lang}</span>
                        </label>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </aside>

            {/* Main Content Area */}
            <section className="flex-1 min-w-0">
              {/* Toolbar */}
              <div className="flex flex-wrap items-center justify-between gap-4 mb-6">
                <p className="text-gray-600 dark:text-gray-400 font-medium">
                  Showing {processedBooks.length} book{processedBooks.length !== 1 && 's'}
                </p>
                <div className="flex items-center gap-4">
                  {/* Sort */}
                  <div className="flex items-center gap-2 text-sm">
                    <span className="text-gray-500">Sort by:</span>
                    <select 
                      value={`${sort.field}-${sort.order}`}
                      onChange={(e) => {
                        const [f, o] = e.target.value.split('-');
                        setSort({ field: f, order: o });
                      }}
                      className="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg py-1 px-2 focus:ring-primary focus:border-primary outline-none"
                    >
                      <option value="date_added-desc">Newest Added</option>
                      <option value="date_added-asc">Oldest Added</option>
                      <option value="title-asc">Title (A-Z)</option>
                      <option value="title-desc">Title (Z-A)</option>
                      <option value="rating-desc">Highest Rated</option>
                      <option value="year-desc">Newest Published</option>
                    </select>
                  </div>
                  {/* View Toggle */}
                  <div className="flex items-center bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-1">
                    <button onClick={() => setView('grid')} className={`p-1.5 rounded-md transition ${view==='grid' ? 'bg-gray-100 dark:bg-gray-700 text-primary' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}>
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    </button>
                    <button onClick={() => setView('list')} className={`p-1.5 rounded-md transition ${view==='list' ? 'bg-gray-100 dark:bg-gray-700 text-primary' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}>
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                  </div>
                </div>
              </div>

              {/* Loading State */}
              {loading && (
                <div className={`grid gap-6 ${view === 'grid' ? 'grid-cols-2 lg:grid-cols-3 xl:grid-cols-4' : 'grid-cols-1'}`}>
                  {[1,2,3,4,5,6].map(i => (
                    <div key={i} className="h-72 rounded-xl skeleton"></div>
                  ))}
                </div>
              )}

              {/* Empty State */}
              {!loading && processedBooks.length === 0 && (
                <div className="text-center py-20 bg-white dark:bg-gray-800 rounded-xl border border-dashed border-gray-300 dark:border-gray-700">
                  <span className="text-4xl mb-4 block">👻</span>
                  <h3 className="text-xl font-semibold mb-2">No books found</h3>
                  <p className="text-gray-500">Try adjusting your search or filters to find what you're looking for.</p>
                  <button onClick={clearFilters} className="mt-4 px-4 py-2 bg-primary text-white rounded-lg hover:bg-blue-600 transition">Clear all filters</button>
                </div>
              )}

              {/* Book Grid/List */}
              {!loading && processedBooks.length > 0 && (
                <div className={view === 'grid' 
                  ? 'grid grid-cols-2 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6' 
                  : 'flex flex-col gap-4'
                }>
                  {processedBooks.map(book => (
                    <div 
                      key={book.id} 
                      onClick={() => setSelectedBook(book)}
                      className={`group bg-white dark:bg-gray-800 rounded-xl overflow-hidden shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 cursor-pointer border border-gray-100 dark:border-gray-700 flex ${view === 'list' ? 'flex-row h-40' : 'flex-col h-full'}`}
                    >
                      <div className={`${view === 'list' ? 'w-28 flex-shrink-0' : 'w-full aspect-[2/3]'} relative bg-gray-100 dark:bg-gray-700 overflow-hidden`}>
                        {book.image_url ? (
                          <img src={book.image_url} loading="lazy" alt={book.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onError={e => e.target.style.display='none'} />
                        ) : (
                          <div className="w-full h-full flex items-center justify-center text-gray-400 text-xs text-center p-2 border-r dark:border-gray-700">No Cover</div>
                        )}
                        {/* Status Badge overlay for grid */}
                        {view === 'grid' && (
                           <div className={`absolute top-2 right-2 px-2 py-1 text-[10px] font-bold uppercase tracking-wide rounded-md shadow-sm backdrop-blur-md ${STATUS_COLORS[book.status]}`}>
                             {book.status}
                           </div>
                        )}
                      </div>
                      
                      <div className={`flex flex-col flex-1 ${view === 'list' ? 'p-4 justify-center' : 'p-4'}`}>
                        {view === 'list' && (
                          <div className="flex justify-between items-start mb-1">
                            <span className={`px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide rounded-md ${STATUS_COLORS[book.status]}`}>{book.status}</span>
                            <div className="flex">{Array.from({ length: 5 }).map((_, i) => <StarIcon key={i} filled={i < book.rating} />)}</div>
                          </div>
                        )}
                        
                        <h3 className={`font-bold text-gray-900 dark:text-white leading-tight mb-1 line-clamp-2 ${view === 'list' ? 'text-lg' : 'text-base mt-2'}`} title={book.title}>
                          {book.title}
                        </h3>
                        <p className="text-sm text-gray-600 dark:text-gray-400 line-clamp-1">{book.authors?.join(', ')}</p>
                        
                        {view === 'grid' && (
                           <div className="mt-auto pt-4 flex justify-between items-center">
                             <div className="flex">{Array.from({ length: 5 }).map((_, i) => <StarIcon key={i} filled={i < book.rating} />)}</div>
                             <span className="text-xs text-gray-400">{book.year}</span>
                           </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </section>
          </main>

          <BookModal book={selectedBook} onClose={() => setSelectedBook(null)} onTagClick={handleTagClick} />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
